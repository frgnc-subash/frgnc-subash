name: Generate Snake

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      #  Needed to commit and push the generated image.
      contents: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake animation
        uses: Platane/snk@v3 # Or the specific snake generator you prefer
        with:
          github_user_name: ${{ github.repository_owner }} # Uses your GitHub username
          # List of files to generate.
          # Behavior on new behavior:
          #   - svg_out_path: All files will be overwritten.
          #   - svg_out_path_overwrite: Only new files will be overwritten.
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      # This step assumes you want the primary snake in the `output` branch
      # and named `snake.svg` as per your <img> tag.
      # Adjust the source and destination if your snake generator outputs 
      # differently or you want a different file name/location.
      - name: Push to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B output # Create or switch to the 'output' branch
          # Ensure the 'dist' directory and the specific SVG exists
          # This example copies 'github-contribution-grid-snake.svg' to 'snake.svg'
          # Adjust if your generated file name is different.
          cp dist/github-contribution-grid-snake.svg ./snake.svg 
          git add snake.svg
          git commit -m "Generate Contribution Snake" || echo "No changes to commit"
          git push -f origin output
